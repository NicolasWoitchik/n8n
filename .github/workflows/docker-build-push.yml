name: Docker Build and Push

on:
  release:
    types: [published]

env:
  REGISTRY: git.wtk.app
  IMAGE: git.wtk.app/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build n8n
        run: pnpm build:n8n
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

      - name: Login to Forgejo Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version (strip v prefix)
        id: version
        run: echo "N8N_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/images/n8n/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            N8N_VERSION=${{ steps.version.outputs.N8N_VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE }}:latest
