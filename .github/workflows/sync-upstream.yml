name: Sync upstream n8n

on:
  schedule:
    - cron: '0 6 * * *' # todo dia às 6h UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/n8n-io/n8n.git
          git fetch upstream

      - name: Update n8n-base
        run: |
          git checkout n8n-base
          git merge upstream/master --no-edit
          git push origin n8n-base

      - name: Check if master is behind n8n-base
        id: check
        run: |
          BEHIND=$(git rev-list master..n8n-base --count)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

      - name: Create sync branch
        if: steps.check.outputs.behind != '0'
        id: branch
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout master
          git checkout -b $BRANCH
          git merge n8n-base --no-edit || true # conflitos serão resolvidos no PR
          git push origin $BRANCH
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open PR into master
        if: steps.check.outputs.behind != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.name }}
          base: master
          title: "chore: sync upstream n8n (${{ github.run_id }})"
          body: |
            Sync automático com [n8n-io/n8n](https://github.com/n8n-io/n8n).

            - `n8n-base` já foi atualizado com o upstream
            - Este PR faz o merge de `n8n-base` → `master`
            - Resolva conflitos antes de fazer merge

            > Gerado automaticamente pelo workflow `sync-upstream`.
          labels: upstream-sync
